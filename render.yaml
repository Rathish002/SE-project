services:
  - type: web
    name: se-project-server
    env: node
    plan: free
    rootDir: server
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: NLP_SERVICE_URL
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false

  - type: web
    name: se-project-nlp
    env: python
    plan: free
    rootDir: nlp-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
