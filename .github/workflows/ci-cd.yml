name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  server-ci:
    name: Server CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build

  nlp-ci:
    name: NLP CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nlp-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py utils/transliterate.py

  deploy-frontend:
    name: Deploy Frontend (Firebase)
    runs-on: ubuntu-latest
    needs:
      - frontend-ci
      - server-ci
      - nlp-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check Firebase secrets
        id: firebase-secrets
        shell: bash
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
        run: |
          if [ -n "$FIREBASE_PROJECT_ID" ] && [ -n "$FIREBASE_TOKEN" ] && [ -n "$REACT_APP_API_URL" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Firebase and frontend API URL secrets found."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Missing FIREBASE_PROJECT_ID, FIREBASE_TOKEN, and/or REACT_APP_API_URL. Skipping Firebase deploy."
          fi

      - name: Checkout
        if: steps.firebase-secrets.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.firebase-secrets.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        if: steps.firebase-secrets.outputs.ready == 'true'
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install Firebase CLI
        if: steps.firebase-secrets.outputs.ready == 'true'
        run: npm install --global firebase-tools

      - name: Deploy to Firebase Hosting
        if: steps.firebase-secrets.outputs.ready == 'true'
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only hosting --project "$FIREBASE_PROJECT_ID" --token "$FIREBASE_TOKEN"

  deploy-render:
    name: Deploy API/NLP (Render)
    runs-on: ubuntu-latest
    needs:
      - frontend-ci
      - server-ci
      - nlp-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check Render deploy hooks
        id: render-hooks
        shell: bash
        env:
          RENDER_SERVER_DEPLOY_HOOK: ${{ secrets.RENDER_SERVER_DEPLOY_HOOK }}
          RENDER_NLP_DEPLOY_HOOK: ${{ secrets.RENDER_NLP_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_SERVER_DEPLOY_HOOK" ]; then
            echo "server-ready=true" >> "$GITHUB_OUTPUT"
            echo "Server deploy hook found."
          else
            echo "server-ready=false" >> "$GITHUB_OUTPUT"
            echo "Missing RENDER_SERVER_DEPLOY_HOOK. Server deploy will be skipped."
          fi

          if [ -n "$RENDER_NLP_DEPLOY_HOOK" ]; then
            echo "nlp-ready=true" >> "$GITHUB_OUTPUT"
            echo "NLP deploy hook found."
          else
            echo "nlp-ready=false" >> "$GITHUB_OUTPUT"
            echo "Missing RENDER_NLP_DEPLOY_HOOK. NLP deploy will be skipped."
          fi

      - name: Trigger Render server deploy
        if: steps.render-hooks.outputs.server-ready == 'true'
        env:
          RENDER_SERVER_DEPLOY_HOOK: ${{ secrets.RENDER_SERVER_DEPLOY_HOOK }}
        run: curl -fsS -X POST "$RENDER_SERVER_DEPLOY_HOOK"

      - name: Trigger Render NLP deploy
        if: steps.render-hooks.outputs.nlp-ready == 'true'
        env:
          RENDER_NLP_DEPLOY_HOOK: ${{ secrets.RENDER_NLP_DEPLOY_HOOK }}
        run: curl -fsS -X POST "$RENDER_NLP_DEPLOY_HOOK"